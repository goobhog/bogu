name: Bogu CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install SBCL
        run: sudo apt-get update && sudo apt-get install -y sbcl

      - name: Run Bogu Master Diagnostics
        run: |
          sbcl --non-interactive \
               --load boot.lisp \
               --load tests.lisp \
               --eval "(bogu::run-bogu-tests)" \
               --eval "(uiop:quit (if (= bogu::*test-failures* 0) 0 1))"