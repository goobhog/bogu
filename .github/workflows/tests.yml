name: Bogu CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install SBCL
        run: sudo apt-get update && sudo apt-get install -y sbcl curl

      - name: Install Quicklisp
        run: |
          curl -O https://beta.quicklisp.org/quicklisp.lisp
          sbcl --non-interactive \
               --load quicklisp.lisp \
               --eval "(quicklisp-quickstart:install)"

      - name: Run Bogu Master Diagnostics
        run: |
          sbcl --non-interactive \
               --eval "(load \"~/quicklisp/setup.lisp\")" \
               --load boot.lisp \
               --load tests.lisp \
               --eval "(let ((*package* (find-package :bogu))) (bogu::run-bogu-tests))" \
               --eval "(uiop:quit (if (= bogu::*test-failures* 0) 0 1))"